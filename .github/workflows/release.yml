name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-tag:
    name: Verify release tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure tag commit is on master
        run: |
          git fetch origin master --depth=1
          git merge-base --is-ancestor "$GITHUB_SHA" origin/master

      - name: Ensure package version matches tag
        run: test "v$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")" = "$GITHUB_REF_NAME"

  publish:
    name: Publish to npm
    needs: verify-tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish package
        run: pnpm publish --access public --provenance --no-git-checks
